<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Luxury Stay Hotel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <header>
        <h2 class="logo">LuxuryStay</h2>
        <nav>
            <a href="#">Home</a>
            <a href="#">Rooms</a>
            <a href="#">Gallery</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to Luxury Stay</h1>
            <p>Book your dream vacation with comfort and elegance.</p>
            <button>Book Now</button>
        </div>
    </section>

    <!-- Rooms Section -->
    <section class="rooms">
        <h2>Our Rooms</h2>
        <div class="room-container">
            
            <div class="room-card">
                <img src="https://source.unsplash.com/300x200/?hotel-room" alt="">
                <h3>Deluxe Room</h3>
                <p>₹3,000 / Night</p>
                <button>View Details</button>
            </div>

            <div class="room-card">
                <img src="https://source.unsplash.com/300x200/?luxury-hotel" alt="">
                <h3>Executive Suite</h3>
                <p>₹5,500 / Night</p>
                <button>View Details</button>
            </div>

            <div class="room-card">
                <img src="https://source.unsplash.com/300x200/?resort-room" alt="">
                <h3>Premium Suite</h3>
                <p>₹8,000 / Night</p>
                <button>View Details</button>
            </div>

        </div>
    </section>

    <!-- Booking Form -->
    <section class="booking">
        <h2>Book Your Stay</h2>
        <form>
            <input type="text" placeholder="Full Name">
            <input type="email" placeholder="Email">
            <input type="date">
            <input type="date">
            <button type="submit">Reserve Now</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 LuxuryStay Hotel | All Rights Reserved</p>
    </footer>

</body>
</html>
